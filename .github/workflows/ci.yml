name: CI

# Format / lint / type-check / build on every push and PR.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: ESLint
        run: npx eslint .

      - name: TypeScript type-check
        run: npx tsc --noEmit -p tsconfig.app.json

      - name: Vite build
        run: npm run build
