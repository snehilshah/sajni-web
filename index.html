<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon-dark.svg" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon/favicon-48.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon/favicon-96.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="/favicon/site.webmanifest" />
    <meta name="theme-color" content="#B53A2D" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Sajni — Your personal second brain. Notes, journal, tasks, habits, and more." />
    <title>Sajni</title>
    <script>
      (function () {
        try {
          var root = document.documentElement;
          var theme = localStorage.getItem('sajni:theme') || 'default';
          var modePref = localStorage.getItem('sajni:mode') || 'system';
          var density = localStorage.getItem('sajni:density') || 'comfortable';
          var effectiveMode = modePref;
          if (modePref === 'system') {
            effectiveMode = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          root.dataset.theme = theme;
          root.dataset.mode = effectiveMode;
          root.dataset.density = density;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
